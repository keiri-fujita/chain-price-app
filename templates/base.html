<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %}チェーン価格計算{% endblock %}</title>

    <!-- iPhone / iPad ホーム画面アイコン -->
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">

    <!-- ブラウザタブ用アイコン -->
    <link rel="icon" type="image/png" sizes="32x32"
          href="{{ url_for('static', filename='favicon-32.png') }}">

    <link rel="icon" type="image/png" sizes="16x16"
          href="{{ url_for('static', filename='favicon-16.png') }}">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <div>
                <h1 class="site-title">チェーン価格計算</h1>
            </div>

            {% if session.get('logged_in') %}
            <nav>
                <a class="logout-link" href="{{ url_for('logout') }}">ログアウト</a>
            </nav>
            {% endif %}
        </div>
    </header>

    <main class="page-container">
        {% block content %}{% endblock %}
    </main>
</body>

</html>
